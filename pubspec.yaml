name: shakey
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.10.4

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.9.1
  url_launcher: ^6.2.0
  http: ^1.2.0
  shared_preferences: ^2.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Nunito
      fonts:
        - asset: assets/fonts/Nunito_Sans/NunitoSans-VariableFont_YTLC,opsz,wdth,wght.ttf
        - asset: assets/fonts/Nunito_Sans/NunitoSans-Italic-VariableFont_YTLC,opsz,wdth,wght.ttf
          style: italic
    - family: Kanit
      fonts:
        - asset: assets/fonts/Kanit/Kanit-Thin.ttf
          weight: 100
        - asset: assets/fonts/Kanit/Kanit-ExtraLight.ttf
          weight: 200
        - asset: assets/fonts/Kanit/Kanit-Light.ttf
          weight: 300
        - asset: assets/fonts/Kanit/Kanit-Regular.ttf
          weight: 400
        - asset: assets/fonts/Kanit/Kanit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Kanit/Kanit-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Kanit/Kanit-Bold.ttf
          weight: 700
        - asset: assets/fonts/Kanit/Kanit-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/Kanit/Kanit-Black.ttf
          weight: 900
